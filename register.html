<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — ZeRo</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="auth-page">

  <!-- LEFT: Branding -->
  <div class="auth-left">
    <div class="auth-brand-mark">
      <svg class="brand-logo-svg" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="boltGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#a89cf7"/>
            <stop offset="100%" stop-color="#7c6ef5"/>
          </linearGradient>
        </defs>
        <circle cx="60" cy="60" r="56" stroke="rgba(124,110,245,0.3)" stroke-width="1.5" fill="none"/>
        <circle cx="60" cy="60" r="46" stroke="rgba(124,110,245,0.15)" stroke-width="1" fill="none"/>
        <path d="M68 14 L38 64 L56 64 L46 106 L82 52 L63 52 Z"
              fill="url(#boltGrad2)" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-linejoin="round"/>
      </svg>
      <div class="brand-name">ZeRo</div>
      <div class="brand-tagline">Join today</div>
    </div>
  </div>

  <!-- RIGHT: Register Form -->
  <div class="auth-right">
    <div class="auth-right-inner">

      <h1 class="auth-heading">Create<br>your account.</h1>

      <form id="register-form" class="auth-form" novalidate>

        <div class="avatar-upload-group">
          <div class="avatar-preview-wrap">
            <img id="avatar-preview" src="assets/default-avatar.svg" alt="Profile picture preview">
            <label for="avatar-input" class="avatar-upload-btn" title="Upload photo">📷</label>
            <input type="file" id="avatar-input" accept="image/*" class="sr-only">
          </div>
          <span style="font-size:0.75rem;color:rgba(255,255,255,0.3);">Profile photo (optional)</span>
        </div>

        <div class="form-group">
          <label for="reg-username">Username</label>
          <input type="text" id="reg-username" placeholder="cooluser_99" maxlength="20">
        </div>

        <div class="form-group">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email">
        </div>

        <div class="form-group">
          <label for="reg-password">Password</label>
          <div class="input-wrap">
            <input type="password" id="reg-password" placeholder="Min. 8 characters">
            <button type="button" class="toggle-pw" data-target="reg-password" aria-label="Toggle password visibility">Show</button>
          </div>
          <div class="password-strength">
            <div class="strength-bar" id="sb1"></div>
            <div class="strength-bar" id="sb2"></div>
            <div class="strength-bar" id="sb3"></div>
            <div class="strength-bar" id="sb4"></div>
          </div>
          <span class="strength-label" id="strength-label"></span>
        </div>

        <div class="form-group">
          <label for="reg-confirm">Confirm Password</label>
          <div class="input-wrap">
            <input type="password" id="reg-confirm" placeholder="Repeat your password">
            <button type="button" class="toggle-pw" data-target="reg-confirm" aria-label="Toggle password visibility">Show</button>
          </div>
        </div>

        <button type="submit" class="auth-btn-primary">Create Account →</button>
    <div id="register-error" class="auth-error hidden"></div>
      </form>

      <div class="auth-switch">
        Already have an account? <a href="index.html">Sign in</a>
      </div>

    </div>
  </div>

</div>

<script src="js/storage.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
